blueprint:
  name: Cảnh báo camera AI - Unique Context v4
  author: TriTue2011 - chucuoi8x edid
  homeassistant:
    min_version: 2025.7.0
  description: "Phân tích sự kiện camera bằng AI Task (Structured Output) HOẶC JSON
    (OpenAI/raw). Gửi thông báo với ảnh và phân tích AI qua điện thoại, Telegram,
    Zalo và TTS ra loa.\n<details> <summary><b>Chi tiết:</b> - Nhấn để mở rộng</summary>\n\n
    \ **Phiên bản: v.2025.10.22-unique-context-v3 - chống cache ảnh/AI task bằng filename unique, task_name unique và attachments JSON native**\n\n
    \ **Tác giả gốc: TriTue2011**\n\n  **Tính năng:**\n\n    1- **Hai chế độ AI:**
    Structured Output (HA native ai_task) hoặc JSON (OpenAI/raw JSON response).\n\n
    \   2- **6 trường hợp prompt đầy đủ:** JSON×3 (humans / animals / both) + Structured×3
    (humans / animals / both).\n\n    3- **Gửi thông báo ngay lập tức** với ảnh, sau
    đó cập nhật kết quả phân tích AI (2 bước).\n\n    4- **Hỗ trợ đa nền tảng:** Mobile
    App (Android/iOS), Telegram, Zalo Bot (Pyscript), Zalo Custom Integration, TTS
    ra loa.\n\n    5- **Phát hiện người và/hoặc động vật** (chó, mèo, chim) — lọc
    báo động ảo.\n\n    6- **Tùy chọn chờ người** bằng occupancy sensor trước khi
    phân tích.\n\n    7- **Cooldown** để tránh spam thông báo.\n\n    8- **continue_on_error**
    cho tất cả action gửi thông báo (HA 2026.3+).\n\n  **Thay đổi so với phiên bản
    cũ:**\n    - Prompt JSON: Tách riêng 3 nhánh humans/animals/both, mỗi nhánh có
    field_rules đầy đủ và chính xác.\n    - Prompt Structured: Tách riên 3 nhánh,
    bổ sung hướng di chuyển (đi vào/đi ra/ngang), cảnh báo vật nguy hiểm, ghi chú
    phương tiện.\n    - ai_structure_description_humans và animals đồng bộ hoàn toàn
    theo detect_subjects.\n    - Chuỗi fallback khớp chính xác với bộ lọc filter phrases.\n\n</details>\n<details>
    <summary><b>⚙️ Yêu cầu cấu hình:</b> - Nhấn để mở rộng</summary>\n\n  **Thêm vào
    `configuration.yaml` để HA nhận diện đúng thư mục media:**\n\n  ```yaml\n  homeassistant:\n
    \   media_dirs:\n      local: /media\n  ```\n\n  ⚠️ Nếu thiếu dòng này, AI Task
    và mobile notification có thể không truy cập được ảnh.\n\n</details>\n"
  domain: automation
  source_url: https://github.com/TriTue2011/Blueprint/blob/main/alarm_person_camera_3.yaml
  input:
    trigger_section:
      name: Trigger Settings
      icon: mdi:play-circle
      input:
        trigger_sensor:
          name: "\U0001F6B6 Trigger Sensor"
          description: "\U0001F449 Cảm biến kích hoạt automation (cửa, motion sensor).\n✅
            Có thể chọn nhiều sensor cùng lúc.\n"
          selector:
            entity:
              filter:
              - domain:
                - binary_sensor
              multiple: true
              reorder: false
        trigger_from_state:
          name: "\U0001F504 Trigger From State"
          description: Trạng thái ban đầu của cảm biến trước khi kích hoạt.
          default: 'off'
          selector:
            select:
              options:
              - 'off'
              - 'on'
              custom_value: true
              multiple: false
              sort: false
        trigger_to_state:
          name: "\U0001F504 Trigger To State"
          description: Trạng thái mà cảm biến chuyển sang để kích hoạt automation.
          default: 'on'
          selector:
            select:
              options:
              - 'on'
              - 'off'
              custom_value: true
              multiple: false
              sort: false
        person_occupancy_sensor:
          name: "\U0001F9CD Person Occupancy Sensor (Optional)"
          description: "\U0001F449 Sensor phát hiện người (ví dụ: mmWave, PIR zone).\n⚠️
            Dùng kết hợp với \"Wait for Person Detection\" bên dưới.\n✅ Nếu không
            dùng, bỏ trống.\n"
          default: []
          selector:
            entity:
              filter:
              - domain:
                - binary_sensor
              multiple: false
              reorder: false
        person_detected_state:
          name: "\U0001F50E Person Detected State"
          description: Trạng thái của sensor khi phát hiện có người.
          default: 'on'
          selector:
            select:
              options:
              - 'on'
              - 'off'
              custom_value: true
              multiple: false
              sort: false
        wait_for_person:
          name: ⏳ Wait for Person Detection
          description: "\U0001F449 Bật để đợi sensor phát hiện người TRƯỚC KHI chụp
            ảnh và phân tích.\n✅ Giúp giảm ảnh chụp khi chưa có người trong khung
            hình.\n"
          default: false
          selector:
            boolean: {}
        max_wait_time:
          name: ⌛ Maximum Wait Time (Optional)
          description: "\U0001F449 Thời gian tối đa (giây) để đợi phát hiện người.\n⚠️
            Đặt 0 = chờ không giới hạn cho đến khi phát hiện người.\n"
          default: 0
          selector:
            number:
              min: 0.0
              max: 3600.0
              unit_of_measurement: seconds
              mode: box
              step: 1.0
    run_conditions:
      name: "\U0001F6E0️ Run Conditions"
      description: "\U0001F449 Thêm Condition để chạy Automation.\n⚠️ Tất cả điều
        kiện phải đúng thì automation mới chạy.\n"
      default: []
      selector:
        condition: {}
    cooldown:
      name: ⏱️ Cooldown
      description: "\U0001F449 Thời gian chờ SAU KHI automation chạy xong trước khi
        có thể chạy lại.\n✅ Giúp tránh spam thông báo khi sensor liên tục kích hoạt.\n"
      default:
        minutes: 10
      selector:
        duration:
          enable_second: true
    camera_sensor_section:
      name: Camera & Snapshot Settings
      icon: mdi:camera
      input:
        camera_entities:
          name: "\U0001F4F8 Camera Entities"
          description: "\U0001F449 Danh sách camera để giám sát.\n⚠️ Hiện tại chỉ
            sử dụng camera đầu tiên trong danh sách để chụp ảnh.\n"
          default: []
          selector:
            entity:
              multiple: true
              filter:
              - domain:
                - camera
              reorder: false
        num_snapshots:
          name: ⌛ Number of Snapshots
          description: "\U0001F449 Số ảnh sẽ chụp liên tiếp để so sánh và gửi cho
            AI phân tích.\n✅ Nhiều ảnh giúp AI phân tích chính xác hơn nhưng mất nhiều
            thời gian hơn.\n"
          default: 1
          selector:
            number:
              min: 1.0
              max: 5.0
              step: 1.0
              unit_of_measurement: snapshots
              mode: slider
        num_delay_before_snapshot:
          name: ⌛ Delay Before First Snapshot
          description: "\U0001F449 Thời gian chờ (giây) TRƯỚC KHI chụp ảnh đầu tiên.\n✅
            Giúp camera ổn định sau khi trigger kích hoạt.\n"
          default: 1
          selector:
            number:
              min: 0.0
              max: 10.0
              step: 0.5
              unit_of_measurement: seconds
              mode: slider
        num_delay:
          name: ⌛ Delay Between Snapshots
          description: "\U0001F449 Thời gian trễ (giây) GIỮA các lần chụp ảnh.\n✅
            Giúp chụp được ảnh ở các thời điểm khác nhau để AI so sánh.\n"
          default: 1
          selector:
            number:
              min: 0.0
              max: 10.0
              step: 0.5
              unit_of_measurement: seconds
              mode: slider
        overwrite_image:
          name: "🏞️ Overwrite Image (Deprecated - không khuyến nghị)"
          description: "👉 Bản v3 luôn dùng tên file unique theo context.id để tránh cache ảnh/AI task.
⚠️ Input này chỉ giữ lại để tương thích, không còn dùng để đặt tên file.
✅ Dùng automation cleanup lúc 00:00 để dọn ảnh thay vì overwrite.
"
          default: false
          selector:
            boolean: {}
    ai_task_section:
      name: AI Task Settings
      icon: mdi:brain
      collapsed: true
      input:
        ai_powered:
          name: ✅ AI-powered (Optional)
          description: "\U0001F449 Bật để dùng AI phân tích ảnh trước khi gửi thông
            báo.\n⚠️ Nếu tắt, sẽ gửi thông báo ngay khi phát hiện chuyển động mà không
            phân tích.\n✅ Khuyến nghị bật để lọc báo động ảo.\n"
          default: true
          selector:
            boolean: {}
        ai_mode:
          name: "\U0001F916 AI Output Mode"
          description: "\U0001F449 Chọn cách AI trả về kết quả phân tích ảnh.\n✅ Structured
            Output: dùng ai_task native của HA (khuyến nghị, ổn định hơn).\n✅ JSON:
            dùng cho OpenAI hoặc AI trả về raw JSON — cần parse thủ công.\n⚠️ Nếu
            chọn JSON, hãy đảm bảo AI provider hỗ trợ trả về đúng định dạng JSON.\n"
          default: structured
          selector:
            select:
              options:
              - label: Structured Output (HA Native - Khuyến nghị)
                value: structured
              - label: JSON (OpenAI / Raw JSON)
                value: json
              multiple: false
              custom_value: false
              sort: false
        detect_subjects:
          name: "\U0001F50D Phát hiện đối tượng"
          description: "\U0001F449 Chọn loại đối tượng muốn AI phân tích và gửi cảnh
            báo.\n✅ Chỉ người: cảnh báo khi phát hiện con người trong ảnh.\n✅ Chỉ
            động vật: cảnh báo khi phát hiện chó, mèo hoặc chim trong ảnh.\n✅ Cả hai:
            cảnh báo khi phát hiện người HOẶC động vật.\n⚠️ Lựa chọn này ảnh hưởng
            trực tiếp đến prompt gửi cho AI và điều kiện lọc thông báo.\n"
          default: humans
          selector:
            select:
              options:
              - label: "\U0001F464 Chỉ phát hiện người"
                value: humans
              - label: "\U0001F43E Chỉ phát hiện động vật (chó, mèo, chim)"
                value: animals
              - label: "\U0001F464\U0001F43E Phát hiện cả người và động vật"
                value: both
              multiple: false
              custom_value: false
              sort: false
        ai_provider:
          name: "\U0001F916 AI Task Provider"
          description: "\U0001F449 Chọn AI Task provider để phân tích ảnh.\n✅ Bỏ trống
            để dùng AI provider mặc định của hệ thống (HA 2025.7+).\n"
          default: []
          selector:
            entity:
              domain:
              - ai_task
              multiple: false
              reorder: false
    notification_section:
      name: Mobile App Notify Settings
      icon: mdi:bell
      collapsed: true
      input:
        include_notify:
          name: ✅ Mobile App Notify Option (Optional)
          description: "\U0001F449 Bật nếu muốn gửi thông báo lên điện thoại đã cài
            HA Companion App.\n"
          default: false
          selector:
            boolean: {}
        is_ios_android:
          name: "\U0001F514 Android or iOS device?"
          description: "\U0001F449 Chọn hệ điều hành của điện thoại nhận thông báo.\n"
          default: android_device
          selector:
            select:
              options:
              - label: Android
                value: android_device
              - label: iOS
                value: ios_device
              multiple: false
              custom_value: false
              sort: false
        notify_device:
          name: "\U0001F4F1 Devices Notified"
          description: "\U0001F449 Chọn điện thoại muốn nhận thông báo đẩy.\n✅ Có
            thể chọn nhiều điện thoại.\n"
          default: []
          selector:
            device:
              filter:
              - integration: mobile_app
              multiple: true
        notify_title:
          name: "\U0001F4DD Title"
          description: "\U0001F449 Tiêu đề của thông báo.\n"
          default: "\U0001F514 <b><span style=\"color: red\">Có chuyển động</span></b>\n"
          selector:
            text:
              multiline: false
              multiple: false
        tap_navigate:
          name: "\U0001F4F2 Tap Navigate"
          description: "\U0001F449 Mở HA và đi đến vị trí này khi nhấn vào thông báo.\n"
          default: /lovelace/camera
          selector:
            text:
              multiline: false
              multiple: false
        status_bar_icon:
          name: "\U0001F320 Status Bar Icon (Android)"
          description: "\U0001F449 Dành cho Android - Thiết lập icon cho thông báo
            trên Status Bar.\n"
          default: mdi:motion-sensor
          selector:
            icon: {}
        notification_color:
          name: "\U0001F3A8 Notification Color (Android)"
          description: "\U0001F449 Dành cho Android - Màu của icon thông báo trên
            Status Bar."
          default:
          - 255
          - 0
          - 0
          selector:
            color_rgb: {}
        notification_time:
          name: "\U0001F552 Notification Time"
          description: "\U0001F449 Tùy chọn hiển thị thời gian trong nội dung thông
            báo."
          default: ''
          selector:
            select:
              options:
              - label: No Time Added
                value: ''
              - label: 12 Hour
                value: at {{ now().strftime('%-I:%M %p') }}
              - label: 24 Hour
                value: at {{ now().strftime('%H:%M') }}
              multiple: false
              custom_value: false
              sort: false
    telegram_section:
      name: Telegram Settings
      icon: mdi:send
      collapsed: true
      input:
        include_telegram_notify:
          name: ✅ Telegram Option (Optional)
          description: "\U0001F449 Bật nếu muốn gửi thông báo lên Telegram.\n"
          default: false
          selector:
            boolean: {}
        telegram_config_entry:
          name: "\U0001F916 Telegram Bot"
          description: "\U0001F449 Chọn Telegram Bot đã cấu hình trong HA."
          default: ''
          selector:
            config_entry:
              integration: telegram_bot
        telegram_target:
          name: "\U0001F9D1‍\U0001F4BB Target Chat ID"
          description: "\U0001F449 Chat ID của người hoặc nhóm nhận thông báo.\n✅
            Bỏ trống để dùng chat ID mặc định của bot.\n"
          default: ''
          selector:
            text:
              multiline: false
              multiple: false
        telegram_thread_id:
          name: "\U0001F9F5 Thread ID (Optional)"
          description: "\U0001F449 ID của chủ đề trong nhóm Telegram (nếu dùng nhóm
            có topic).\n✅ Bỏ trống nếu không dùng topic.\n"
          default: ''
          selector:
            text:
              multiline: false
              multiple: false
        telegram_initial_caption:
          name: "\U0001F4DD Initial Caption"
          description: "\U0001F449 Caption gửi kèm ảnh ban đầu (trước khi có kết quả
            AI)."
          default: "\U0001F514 Phát hiện chuyển động!"
          selector:
            text:
              multiline: false
              multiple: false
    zalo_bot_section:
      name: Zalo Bot Settings (Pyscript)
      icon: mdi:chat
      collapsed: true
      input:
        enable_zalo_bot:
          name: ✅ Enable Zalo Bot (Pyscript)
          description: "\U0001F449 Bật/tắt gửi thông báo qua Zalo Bot dùng Pyscript.\n"
          default: false
          selector:
            boolean: {}
        zalo_bot_chat_id:
          name: "\U0001F9D1‍\U0001F4BB Zalo Bot Chat ID"
          description: "\U0001F449 Chat ID hoặc User ID nhận thông báo Zalo Bot qua
            Pyscript."
          default: ''
          selector:
            text:
              multiline: false
              multiple: false
        zalo_bot_initial_caption:
          name: "\U0001F4DD Zalo Bot Initial Caption"
          description: "\U0001F449 Caption khi gửi ảnh ban đầu qua Zalo Bot."
          default: "\U0001F514 Phát hiện chuyển động!"
          selector:
            text:
              multiline: false
              multiple: false
    zalo_custom_section:
      name: Zalo Custom Integration Settings
      icon: mdi:chat-processing
      collapsed: true
      input:
        enable_zalo_custom:
          name: ✅ Enable Zalo Custom Integration
          description: "\U0001F449 Bật/tắt gửi thông báo qua Zalo Custom Integration
            (zalo_bot).\n"
          default: false
          selector:
            boolean: {}
        zalo_custom_account:
          name: "\U0001F4F1 Zalo Account"
          description: "\U0001F449 Số điện thoại tài khoản Zalo dùng để gửi tin nhắn.\n⚠️
            Ví dụ: +84376861184\n"
          default: ''
          selector:
            text:
              multiline: false
              multiple: false
        zalo_custom_thread_id:
          name: "\U0001F4AC Thread ID (Nhóm)"
          description: "\U0001F449 ID của nhóm Zalo muốn gửi thông báo.\n⚠️ Nhập dạng
            text để tránh mất độ chính xác với số lớn.\n⚠️ Chỉ dùng khi Receiver Type
            = Group.\n"
          default: ''
          selector:
            text:
              multiple: false
              multiline: false
        zalo_custom_user_id:
          name: "\U0001F464 User ID (Cá nhân)"
          description: "\U0001F449 ID của người nhận Zalo.\n⚠️ Nhập dạng text để tránh
            mất độ chính xác với số lớn.\n⚠️ Chỉ dùng khi Receiver Type = User.\n"
          default: ''
          selector:
            text:
              multiple: false
              multiline: false
        zalo_custom_receiver_type:
          name: "\U0001F465 Type of Receiver"
          description: "\U0001F449 Loại người nhận tin nhắn Zalo.\n"
          default: '0'
          selector:
            select:
              options:
              - label: User (Cá nhân)
                value: '0'
              - label: Group (Nhóm)
                value: '1'
              multiple: false
              custom_value: false
              sort: false
        zalo_custom_ttl:
          name: ⏳ Message TTL
          description: "\U0001F449 Thời gian tự động thu hồi tin nhắn (milliseconds).\n✅
            Đặt 0 = không thu hồi. Tối đa 86400000ms = 24 giờ.\n"
          default: 0
          selector:
            number:
              min: 0.0
              max: 86400000.0
              step: 1000.0
              mode: box
        zalo_custom_initial_caption:
          name: "\U0001F4DD Initial Caption"
          description: "\U0001F449 Nội dung tin nhắn ban đầu gửi kèm ảnh qua Zalo
            Custom."
          default: "\U0001F514 Phát hiện chuyển động!"
          selector:
            text:
              multiline: true
              multiple: false
    tts_speaker_section:
      name: TTS Speaker Settings
      icon: mdi:speaker
      collapsed: true
      input:
        include_tts_announcement:
          name: ✅ Use TTS Announcement (Optional)
          description: "\U0001F449 Bật để phát thông báo bằng giọng nói ra loa được
            tích hợp HA.\n"
          default: false
          selector:
            boolean: {}
        num_volume_speaker:
          name: "\U0001F50A Volume Set"
          description: "\U0001F449 Thiết lập âm lượng cho loa (từ 0.1 đến 1.0).\n✅
            Mặc định: 0.5 (50%).\n"
          default: 0.5
          selector:
            number:
              min: 0.1
              max: 1.0
              step: 0.1
              mode: slider
        text_to_speech_engine:
          name: "\U0001F5E3️ Text-to-Speech Service Provider"
          description: "\U0001F449 Chọn dịch vụ TTS hỗ trợ trong HA."
          default: []
          selector:
            entity:
              filter:
              - domain:
                - tts
              multiple: false
              reorder: false
        media_player:
          name: "\U0001F3B6 Media Player"
          description: "\U0001F449 Chọn loa để phát thông báo giọng nói.\n✅ Có thể
            chọn nhiều loa cùng lúc.\n"
          default: []
          selector:
            entity:
              filter:
              - domain:
                - media_player
              multiple: true
              reorder: false
    delay_settings:
      name: Delay Settings
      icon: mdi:clock-start
      collapsed: true
      input:
        num_delay_actions:
          name: ⌛ Delays
          description: "\U0001F449 Thời gian chờ (giây) sau khi hoàn thành tất cả
            các hành động.\n"
          default: 10
          selector:
            number:
              min: 5.0
              max: 120.0
              step: 5.0
              unit_of_measurement: seconds
              mode: slider
variables:
  trigger_sensor: !input trigger_sensor
  person_sensor: !input person_occupancy_sensor
  person_detected_state: !input person_detected_state
  wait_for_person: !input wait_for_person
  max_wait_time: !input max_wait_time
  cooldown: !input cooldown
  camera_entities_list: !input camera_entities
  camera_entity: '{{ camera_entities_list[0] if camera_entities_list else '''' }}'
  camera_name: '{{ state_attr(camera_entity, "friendly_name") | default(camera_entity)
    }}'
  camera_file_path: '{{ camera_entity.replace("camera.", "") }}'
  num_snapshots: !input num_snapshots
  num_delay_before_snapshot: !input num_delay_before_snapshot
  num_delay: !input num_delay
  overwrite_image: !input overwrite_image
  ai_powered: !input ai_powered
  ai_mode: !input ai_mode
  ai_provider: !input ai_provider
  detect_subjects: !input detect_subjects
  ai_task_instructions: "{% if ai_mode == 'json' %}\n\n  {# ============================================================
