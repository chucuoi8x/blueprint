    chuyển (\"đang tiến vào\", \"đang đi ra\" hoặc \"di chuyển ngang\") dựa theo sự
    thay đổi kích thước giữa các khung hình. Nếu có phương tiện xuất hiện một mình
    (không có người đi kèm), ghi chú loại xe và màu sắc. - Nếu animals_detected =
    0, PHẢI trả về CHÍNH XÁC chuỗi: \"Đã phát hiện chuyển động tuy nhiên không có
    động vật trong chuỗi ảnh khi so sánh\".\n  {% endif %}\n{% else %} Không yêu cầu
    phân tích động vật theo cấu hình hiện tại. PHẢI trả về CHÍNH XÁC chuỗi sau (không
    thêm bớt ký tự): \"Không phân tích động vật theo yêu cầu\". {% endif %}\n"
  include_notify: !input include_notify
  notify_device: !input notify_device
  is_ios_android: !input is_ios_android
  notify_title: !input notify_title
  tap_navigate: !input tap_navigate
  notification_time: !input notification_time
  filtered_devices: '{{ notify_device }}'
  include_telegram_notify: !input include_telegram_notify
  telegram_config_entry: !input telegram_config_entry
  telegram_target: !input telegram_target
  telegram_thread_id: !input telegram_thread_id
  telegram_initial_caption: !input telegram_initial_caption
  enable_zalo_bot: !input enable_zalo_bot
  zalo_bot_chat_id: !input zalo_bot_chat_id
  zalo_bot_initial_caption: !input zalo_bot_initial_caption
  enable_zalo_custom: !input enable_zalo_custom
  zalo_custom_account: !input zalo_custom_account
  zalo_custom_thread_id: !input zalo_custom_thread_id
  zalo_custom_user_id: !input zalo_custom_user_id
  zalo_custom_receiver_type: !input zalo_custom_receiver_type
  zalo_custom_ttl: !input zalo_custom_ttl
  zalo_custom_initial_caption: !input zalo_custom_initial_caption
  zalo_resolved_id: "{% if zalo_custom_receiver_type == '1' %}\n  {{ zalo_custom_thread_id
    if zalo_custom_thread_id | length > 0 else '' }}\n{% else %}\n  {{ zalo_custom_user_id
    if zalo_custom_user_id | length > 0 else '' }}\n{% endif %}\n"
  include_tts_announcement: !input include_tts_announcement
  num_volume_speaker: !input num_volume_speaker
  text_to_speech_engine: !input text_to_speech_engine
  media_player: !input media_player
  num_delay_actions: !input num_delay_actions
  tag: '{{ camera_entity + int(as_timestamp(now())) | string }}'
  notification_color: !input notification_color
  notification_color_hex: '#{{ ''%02x%02x%02x'' | format(notification_color[0], notification_color[1],
    notification_color[2]) }}

    '
max_exceeded: silent
mode: single
trigger_variables:
  _trigger_sensors: !input trigger_sensor
triggers:
- platform: state
  entity_id: !input trigger_sensor
  from: !input trigger_from_state
  to: !input trigger_to_state
actions:
- choose:
  - conditions:
    - condition: template
      value_template: '{{ wait_for_person and person_sensor | length > 0 }}'
    sequence:
    - if:
      - condition: state
        entity_id: !input person_occupancy_sensor
        state: !input person_detected_state
      then: []
      else:
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ max_wait_time == 0 }}'
          sequence:
          - wait_for_trigger:
            - platform: state
              entity_id: !input person_occupancy_sensor
              to: !input person_detected_state
            continue_on_timeout: true
        - conditions:
          - condition: template
            value_template: '{{ max_wait_time > 0 }}'
          sequence:
          - wait_for_trigger:
            - platform: state
              entity_id: !input person_occupancy_sensor
              to: !input person_detected_state
            timeout:
              seconds: '{{ max_wait_time }}'
            continue_on_timeout: true
- variables:
    # Luôn dùng tên file unique theo context.id để tránh HA/media-source/AI task cache ảnh cũ.
    # Input Overwrite Image được giữ lại để tương thích blueprint cũ nhưng không còn dùng cho filename.
    file_path_dynamic: >-
      {{ camera_file_path }}_{{ context.id }}
- delay:
    seconds: '{{ num_delay_before_snapshot }}'
- repeat:
    count: '{{ num_snapshots }}'
    sequence:
    - action: camera.snapshot
      data:
        filename: /media/snapshots/{{ file_path_dynamic }}_snapshot{{ repeat.index
          }}.jpg
      target:
        entity_id: '{{ camera_entity }}'
    - if:
      - condition: template
        value_template: '{{ repeat.index < num_snapshots }}'
      then:
      - delay:
          seconds: '{{ num_delay }}'
- variables:
    # Danh sách attachment được dựng thành JSON rồi from_json khi gọi ai_task.
    # Cách này tránh trường hợp HA render list thành chuỗi YAML/Python khiến ai_task dùng sai/cached attachment.
    snapshots_json: >-
      {% set snap_count = num_snapshots | int %}
      {% set camera = file_path_dynamic %}
      {% set ns = namespace(images=[]) %}
      {%- for i in range(1, snap_count + 1) -%}
        {% set ns.images = ns.images + [{
          'media_content_id': 'media-source://media_source/local/snapshots/' ~ camera ~ '_snapshot' ~ i ~ '.jpg',
          'media_content_type': 'image/jpeg'
        }] %}
      {%- endfor -%}
      {{ ns.images | to_json }}
    snapshot_first: /media/local/snapshots/{{ file_path_dynamic }}_snapshot1.jpg
- choose:
  - conditions:
    - condition: template
      value_template: '{{ include_telegram_notify }}'
    sequence:
    - alias: Gửi ảnh qua Telegram
      continue_on_error: true
      action: telegram_bot.send_photo
      data: "{% set data = {\n  'config_entry_id': telegram_config_entry,\n  'file':
        '/media/snapshots/' + file_path_dynamic + '_snapshot1.jpg',\n  'caption':
        telegram_initial_caption\n} %} {% if telegram_target != \"\" %}\n  {% set
        data = dict(data, chat_id=telegram_target | int) %}\n{% endif %} {% if telegram_thread_id
        != \"\" %}\n  {% set data = dict(data, message_thread_id=telegram_thread_id
        | int) %}\n{% endif %} {{ data }}\n"
- choose:
  - conditions:
    - condition: template
      value_template: '{{ enable_zalo_bot }}'
    sequence:
    - alias: Gửi ảnh qua Zalo Bot (Pyscript)
      continue_on_error: true
      action: pyscript.send_zalo_photo
      data:
        chat_id: '{{ zalo_bot_chat_id }}'
        file_path: /media/snapshots/{{ file_path_dynamic }}_snapshot1.jpg
        caption: '{{ zalo_bot_initial_caption }}'
      response_variable: zalo_bot_photo_response
- choose:
  - conditions:
    - condition: template
      value_template: "{{ enable_zalo_custom\n   and zalo_resolved_id | trim | length
        > 0\n   and zalo_custom_account | length > 0 }}\n"
    sequence:
    - alias: Gửi ảnh qua Zalo Custom Integration
      continue_on_error: true
      action: zalo_bot.send_image
      data:
        account_selection: !input zalo_custom_account
        thread_id: '{{ zalo_resolved_id | trim | string }}'
        type: !input zalo_custom_receiver_type
        image_path: /media/snapshots/{{ file_path_dynamic }}_snapshot1.jpg
        message: '{{ zalo_custom_initial_caption }}'
        ttl: !input zalo_custom_ttl
      response_variable: zalo_custom_image_response
- if:
  - condition: template
    value_template: '{{ include_notify and (filtered_devices | length > 0) }}'
  then:
  - choose:
    - alias: Android - Bước 1 gửi ảnh
      conditions:
      - '{{ is_ios_android == ''android_device'' }}'
      sequence:
      - repeat:
          for_each: '{{ filtered_devices }}'
          sequence:
          - continue_on_error: true
            action: 'notify.mobile_app_{{ device_attr(repeat.item, ''name'') | slugify
              }}

              '
            data:
              title: !input notify_title
              message: "\U0001F4F7 Ảnh chụp từ {{ camera_name }}"
              data:
                priority: high
                notification_icon: !input status_bar_icon
                color: '{{ notification_color_hex }}'
                image: '{{ snapshot_first }}'
                url: '{{ tap_navigate }}'
                clickAction: '{{ tap_navigate }}'
                tag: '{{ tag }}_image'
    - alias: iOS - Bước 1 gửi ảnh
      conditions:
      - '{{ is_ios_android == ''ios_device'' }}'
      sequence:
      - repeat:
          for_each: '{{ filtered_devices }}'
          sequence:
          - continue_on_error: true
            action: 'notify.mobile_app_{{ device_attr(repeat.item, ''name'') | slugify
              }}

              '
            data:
              title: !input notify_title
              message: "\U0001F4F7 Ảnh chụp từ {{ camera_name }}"
              data:
                attachment:
                  url: '{{ snapshot_first }}'
                  content_type: JPEG
                tag: '{{ tag }}_image'
- choose:
  - alias: Chạy phân tích AI nếu được bật
    conditions:
    - '{{ ai_powered }}'
    sequence:
    - choose:
      - alias: Structured Output Mode
        conditions:
        - condition: template
          value_template: '{{ ai_mode == ''structured'' }}'
        sequence:
        - action: ai_task.generate_data
          data:
            task_name: "Phan tich anh {{ context.id }} {{ now().timestamp() }}"
            instructions: >-
              Request ID: {{ context.id }}.
              Snapshot prefix: {{ file_path_dynamic }}.
              Attached snapshot: media-source://media_source/local/snapshots/{{ file_path_dynamic }}_snapshot1.jpg.
              Đây là lần phân tích mới, độc lập với mọi lần chạy trước.
              Chỉ phân tích các ảnh snapshot được đính kèm trong chính request này.
              Không sử dụng, không lặp lại, không tham chiếu mô tả, kết quả, trí nhớ hoặc ngữ cảnh từ các lần phân tích trước.
              Chỉ mô tả những gì nhìn thấy rõ trong ảnh hiện tại.
              Không suy đoán hành động như nấu ăn, đi ra ngoài, cầm vật nguy hiểm nếu không nhìn thấy rõ.
              Nếu người đứng hoặc ngồi gần khu vực bếp nhưng không thấy thao tác nấu ăn rõ ràng, chỉ nói là đang đứng/ngồi gần khu vực bếp.

              {{ ai_task_instructions }}
            entity_id: '{{ ai_provider if ai_provider | length > 0 else omit }}'
            attachments:
              - media_content_id: media-source://media_source/local/snapshots/{{ file_path_dynamic }}_snapshot1.jpg
                media_content_type: image/jpeg
            structure:
              humans_detected:
                description: 'Tổng số người đếm được trong chuỗi ảnh (số nguyên ≥
                  0). Nếu không có người hoặc không yêu cầu phân tích người → điền
                  0.

                  '
                required: true
                selector:
                  number:
              humans_detected_summary:
                description: 'Tóm tắt số lượng người theo loại, viết tiếng Việt có
                  dấu. Ví dụ: "1 phụ nữ, 2 đàn ông, 1 trẻ em". Trả về chuỗi rỗng nếu
                  không có người hoặc không yêu cầu phân tích người.

                  '
                required: true
                selector:
                  text:
              humans_detected_description:
                description: '{{ ai_structure_description_humans }}'
                required: true
                selector:
                  text:
              animals_detected:
                description: 'Tổng số động vật (chó, mèo, chim, v.v.) đếm được trong
                  chuỗi ảnh (số nguyên ≥ 0). Nếu không có động vật hoặc không yêu
                  cầu phân tích động vật → điền 0.

                  '
                required: true
                selector:
                  number:
              animals_detected_summary:
                description: 'Tóm tắt số lượng động vật theo loài, viết tiếng Việt
                  có dấu. Ví dụ: "1 con chó vàng, 2 con mèo đen". Trả về chuỗi rỗng
                  nếu không có động vật hoặc không yêu cầu phân tích động vật.

                  '
                required: true
                selector:
                  text:
              animals_detected_description:
                description: '{{ ai_structure_description_animals }}'
                required: true
                selector:
                  text:
          response_variable: humans_detected_report
      - alias: JSON Mode (OpenAI / Raw JSON)
        conditions:
        - condition: template
          value_template: '{{ ai_mode == ''json'' }}'
        sequence:
        - action: ai_task.generate_data
          data:
            task_name: "Phan tich anh {{ context.id }} {{ now().timestamp() }}"
            instructions: >-
              Request ID: {{ context.id }}.
              Snapshot prefix: {{ file_path_dynamic }}.
              Attached snapshot: media-source://media_source/local/snapshots/{{ file_path_dynamic }}_snapshot1.jpg.
              Đây là lần phân tích mới, độc lập với mọi lần chạy trước.
              Chỉ phân tích các ảnh snapshot được đính kèm trong chính request này.
              Không sử dụng, không lặp lại, không tham chiếu mô tả, kết quả, trí nhớ hoặc ngữ cảnh từ các lần phân tích trước.
              Chỉ mô tả những gì nhìn thấy rõ trong ảnh hiện tại.
              Không suy đoán hành động như nấu ăn, đi ra ngoài, cầm vật nguy hiểm nếu không nhìn thấy rõ.
              Nếu người đứng hoặc ngồi gần khu vực bếp nhưng không thấy thao tác nấu ăn rõ ràng, chỉ nói là đang đứng/ngồi gần khu vực bếp.

              {{ ai_task_instructions }}
            entity_id: '{{ ai_provider if ai_provider | length > 0 else omit }}'
            attachments:
              - media_content_id: media-source://media_source/local/snapshots/{{ file_path_dynamic }}_snapshot1.jpg
                media_content_type: image/jpeg
          response_variable: humans_detected_report_raw
        - variables:
            humans_detected_report: "{% if humans_detected_report_raw is defined\n
              \  and humans_detected_report_raw.data is defined %}\n  {% set parsed
              = (humans_detected_report_raw.data\n    | regex_replace('```json\\\\s*',
              '')\n    | regex_replace('```\\\\s*', '')\n    | trim\n    | from_json(default={}))
              %}\n  {% set fixed = {\n    'humans_detected':              parsed.get('humans_detected',
              \             parsed.get('humansdetected', 0)),\n    'humans_detected_summary':
              \     parsed.get('humans_detected_summary',      parsed.get('humansdetectedsummary',
              '')),\n    'humans_detected_description':  parsed.get('humans_detected_description',
              \ parsed.get('humansdetecteddescription', '')),\n    'animals_detected':
              \            parsed.get('animals_detected',             parsed.get('animalsdetected',
              0)),\n    'animals_detected_summary':     parsed.get('animals_detected_summary',
              \    parsed.get('animalsdetectedsummary', '')),\n    'animals_detected_description':
              parsed.get('animals_detected_description', parsed.get('animalsdetecteddescription',
              ''))\n  } %}\n  {{ {'data': fixed} }}\n{% else %}\n  {{ {} }}\n{% endif
              %}\n"
    - wait_template: "{{ humans_detected_report is defined\n   and humans_detected_report.data
        is defined }}\n"
      timeout: 00:01:00
      continue_on_timeout: true
    - if:
      - condition: template
        value_template: '{{ wait.completed }}'
      then:
      - variables:
          ai_messages: "{%- set h_count = humans_detected_report.data.get('humans_detected',
            0) | int(0) -%} {%- set a_count = humans_detected_report.data.get('animals_detected',
            0) | int(0) -%} {%- set h_summary = humans_detected_report.data.get('humans_detected_summary',
            '') -%} {%- set a_summary = humans_detected_report.data.get('animals_detected_summary',
            '') -%} {%- set h_desc = humans_detected_report.data.get('humans_detected_description',
            '') -%} {%- set a_desc = humans_detected_report.data.get('animals_detected_description',
            '') -%} {%- set days = ['Thứ hai', 'Thứ ba', 'Thứ tư', 'Thứ năm', 'Thứ
            sáu', 'Thứ bảy', 'Chủ nhật'] -%} {%- set ns = namespace(lines=[]) -%}
            {%- set ns.lines = ns.lines + ['\U0001F4CA  ' + camera_name] -%} {%- if
            detect_subjects in ['humans', 'both'] -%}\n  {%- set ns.lines = ns.lines
            + ['\U0001F6B6: ' + (h_summary if h_summary | length > 0 else h_count
            | string)] -%}\n  {%- set ns.lines = ns.lines + ['\U0001F449 ' + h_desc]
            -%}\n{%- endif -%} {%- if detect_subjects in ['animals', 'both'] -%}\n
            \ {%- set ns.lines = ns.lines + ['\U0001F43E: ' + (a_summary if a_summary
            | length > 0 else a_count | string)] -%}\n  {%- set ns.lines = ns.lines
            + ['\U0001F449 ' + a_desc] -%}\n{%- endif -%} {%- set time_str = '\U0001F552
            ' + now().strftime('%H:%M:%S') + ' ' + days[now().weekday()] + ' Ngày
            ' + now().strftime('%d') + ' Tháng ' + now().strftime('%m') + ' Năm '
            + now().strftime('%Y') + (' ' + notification_time if notification_time
            != '' else '') -%} {%- set ns.lines = ns.lines + [time_str] -%} {{ ns.lines
            | join('\\n') }}"
      - if:
        - condition: template
          value_template: "{% set h_count = humans_detected_report.data.get('humans_detected',
            0) | int(0) %} {% set h_desc  = humans_detected_report.data.get('humans_detected_description',
            '') | lower %} {% set a_count = humans_detected_report.data.get('animals_detected',
            0) | int(0) %} {% set a_desc  = humans_detected_report.data.get('animals_detected_description',
            '') | lower %}\n{# Xác định có người hợp lệ không #} {% set no_human_phrases
            = [\n  'không có người trong chuỗi ảnh khi so sánh',\n  'không có người',\n
            \ 'không có chuỗi hình ảnh nào được cung cấp',\n  'không phân tích người'\n]
            %} {% set human_invalid = namespace(value=false) %} {% for phrase in no_human_phrases
            %}\n  {% if phrase in h_desc %}{% set human_invalid.value = true %}{%
            endif %}\n{% endfor %} {% set human_ok = (h_count > 0) and not human_invalid.value
            %}\n{# Xác định có động vật hợp lệ không #} {% set no_animal_phrases =
            [\n  'không có động vật trong chuỗi ảnh khi so sánh',\n  'không có động
            vật',\n  'không phân tích động vật'\n] %} {% set animal_invalid = namespace(value=false)
            %} {% for phrase in no_animal_phrases %}\n  {% if phrase in a_desc %}{%
            set animal_invalid.value = true %}{% endif %}\n{% endfor %} {% set animal_ok
            = (a_count > 0) and not animal_invalid.value %}\n{# Quyết định gửi thông
            báo theo detect_subjects #} {% if detect_subjects == 'humans' %}\n  {{
            human_ok }}\n{% elif detect_subjects == 'animals' %}\n  {{ animal_ok }}\n{%
            else %}\n  {{ human_ok or animal_ok }}\n{% endif %}\n"
        then:
        - if:
          - condition: template
            value_template: '{{ include_notify and (filtered_devices | length > 0)
              }}'
          then:
          - choose:
            - alias: Android - Bước 2 gửi kết quả AI
              conditions:
              - '{{ is_ios_android == ''android_device'' }}'
              sequence:
              - repeat:
                  for_each: '{{ filtered_devices }}'
                  sequence:
                  - continue_on_error: true
                    action: 'notify.mobile_app_{{ device_attr(repeat.item, ''name'')
                      | slugify }}

                      '
                    data:
                      title: !input notify_title
                      message: '{{ ai_messages }}'
                      data:
                        priority: high
                        notification_icon: !input status_bar_icon
                        color: '{{ notification_color_hex }}'
                        url: '{{ tap_navigate }}'
                        clickAction: '{{ tap_navigate }}'
                        tag: '{{ tag }}_text'
            - alias: iOS - Bước 2 gửi kết quả AI
              conditions:
              - '{{ is_ios_android == ''ios_device'' }}'
              sequence:
              - repeat:
                  for_each: '{{ filtered_devices }}'
                  sequence:
                  - continue_on_error: true
                    action: 'notify.mobile_app_{{ device_attr(repeat.item, ''name'')
                      | slugify }}

                      '
                    data:
                      title: !input notify_title
                      message: '{{ ai_messages }}'
                      data:
                        tag: '{{ tag }}_text'
        - if:
          - condition: template
            value_template: '{{ include_telegram_notify }}'
          then:
          - continue_on_error: true
            action: telegram_bot.send_message
            data: "{% set data = {\n  'config_entry_id': telegram_config_entry,\n
              \ 'message': ai_messages,\n  'parse_mode': 'plain_text'\n} %} {% if
              telegram_target != \"\" %}\n  {% set data = dict(data, chat_id=telegram_target
              | int) %}\n{% endif %} {% if telegram_thread_id != \"\" %}\n  {% set
              data = dict(data, message_thread_id=telegram_thread_id | int) %}\n{%
              endif %} {{ data }}\n"
        - choose:
          - conditions:
            - condition: template
              value_template: '{{ enable_zalo_bot }}'
            sequence:
            - alias: Gửi kết quả AI qua Zalo Bot
              continue_on_error: true
              action: pyscript.send_zalo_message
              data:
                chat_id: '{{ zalo_bot_chat_id }}'
                message: '{{ ai_messages }}'
              response_variable: zalo_bot_message_response
        - choose:
          - conditions:
            - condition: template
              value_template: "{{ enable_zalo_custom\n   and zalo_resolved_id | trim
                | length > 0\n   and zalo_custom_account | length > 0 }}\n"
            sequence:
            - alias: Gửi kết quả AI qua Zalo Custom
              continue_on_error: true
              action: zalo_bot.send_message
              data:
                account_selection: !input zalo_custom_account
                thread_id: '{{ zalo_resolved_id | trim | string }}'
                type: !input zalo_custom_receiver_type
                message: '{{ ai_messages }}'
                ttl: !input zalo_custom_ttl
              response_variable: zalo_custom_message_response
        - if:
          - condition: template
            value_template: '{{ include_tts_announcement }}'
          then:
          - alias: TTS ra từng loa
            repeat:
              for_each: '{{ media_player }}'
              sequence:
              - continue_on_error: true
                action: media_player.volume_set
                data:
                  volume_level: '{{ num_volume_speaker }}'
                target:
                  entity_id: '{{ repeat.item }}'
              - continue_on_error: true
                action: tts.speak
                target:
                  entity_id: !input text_to_speech_engine
                data:
                  media_player_entity_id: '{{ repeat.item }}'
                  message: "{% set h_count = humans_detected_report.data.get('humans_detected',
                    0) | int(0) %} {% set a_count = humans_detected_report.data.get('animals_detected',
                    0) | int(0) %} {% set parts = [] %} {% if detect_subjects in ['humans',
                    'both'] and h_count > 0 %}\n  {% set parts = parts + [humans_detected_report.data.get('humans_detected_description',
                    '')] %}\n{% endif %} {% if detect_subjects in ['animals', 'both']
                    and a_count > 0 %}\n  {% set parts = parts + [humans_detected_report.data.get('animals_detected_description',
                    '')] %}\n{% endif %} {{ parts | join('. ') if parts | length >
                    0 else 'Phát hiện chuyển động.' }}\n"
      else:
      - variables:
          error_message: "⚠️ AI phân tích ảnh chụp không thành công (timeout). \U0001F552
            {{ now().strftime('%H:%M:%S %a, %d-%b-%Y') }}\n"
      - if:
        - condition: template
          value_template: '{{ include_notify and (filtered_devices | length > 0) }}'
        then:
        - choose:
          - alias: Android - Thông báo lỗi AI timeout (chỉ text)
            conditions:
            - '{{ is_ios_android == ''android_device'' }}'
            sequence:
            - repeat:
                for_each: '{{ filtered_devices }}'
                sequence:
                - continue_on_error: true
                  action: 'notify.mobile_app_{{ device_attr(repeat.item, ''name'')
                    | slugify }}

                    '
                  data:
                    title: !input notify_title
                    message: '{{ error_message }}'
                    data:
                      priority: high
                      notification_icon: !input status_bar_icon
                      color: '{{ notification_color_hex }}'
                      url: '{{ tap_navigate }}'
                      clickAction: '{{ tap_navigate }}'
                      tag: '{{ tag }}_text'
          - alias: iOS - Thông báo lỗi AI timeout (chỉ text)
            conditions:
            - '{{ is_ios_android == ''ios_device'' }}'
            sequence:
            - repeat:
                for_each: '{{ filtered_devices }}'
                sequence:
                - continue_on_error: true
                  action: 'notify.mobile_app_{{ device_attr(repeat.item, ''name'')
                    | slugify }}

                    '
                  data:
                    title: !input notify_title
                    message: '{{ error_message }}'
                    data:
                      tag: '{{ tag }}_text'
      - if:
        - condition: template
          value_template: '{{ include_telegram_notify }}'
        then:
        - continue_on_error: true
          action: telegram_bot.send_message
          data: "{% set data = {\n  'config_entry_id': telegram_config_entry,\n  'message':
            error_message,\n  'parse_mode': 'plain_text'\n} %} {% if telegram_target
            != \"\" %}\n  {% set data = dict(data, chat_id=telegram_target | int)
            %}\n{% endif %} {% if telegram_thread_id != \"\" %}\n  {% set data = dict(data,
            message_thread_id=telegram_thread_id | int) %}\n{% endif %} {{ data }}\n"
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ enable_zalo_bot }}'
          sequence:
          - continue_on_error: true
            action: pyscript.send_zalo_message
            data:
              chat_id: '{{ zalo_bot_chat_id }}'
              message: '{{ error_message }}'
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ enable_zalo_custom\n   and zalo_resolved_id | trim
              | length > 0\n   and zalo_custom_account | length > 0 }}\n"
          sequence:
          - continue_on_error: true
            action: zalo_bot.send_message
            data:
              account_selection: !input zalo_custom_account
              thread_id: '{{ zalo_resolved_id | trim | string }}'
              type: !input zalo_custom_receiver_type
              message: '{{ error_message }}'
              ttl: !input zalo_custom_ttl
- delay:
    seconds: '{{ num_delay_actions }}'
- delay: !input cooldown
conditions:
- condition: and
  conditions: !input run_conditions
